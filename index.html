<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Display">
        <div class="calculator_button">
     
<input type="text" placeholder="calulator" readonly id="calculatour">
<div class="button-cal">
    <button class="button" onclick="currentdisplay=''; document.querySelector('#calculatour').value=currentdisplay">Ac</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'('; document.querySelector('#calculatour').value=currentdisplay">(</button>
    <button class="button" onclick="currentdisplay=currentdisplay+')'; document.querySelector('#calculatour').value=currentdisplay">)</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'%'; document.querySelector('#calculatour').value=currentdisplay">%</button>
</div>

<div class="button-cal">
    <button class="button" onclick="currentdisplay=currentdisplay+'7'; document.querySelector('#calculatour').value=currentdisplay">7</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'8'; document.querySelector('#calculatour').value=currentdisplay">8</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'9'; document.querySelector('#calculatour').value=currentdisplay">9</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'*'; document.querySelector('#calculatour').value=currentdisplay">*</button>
</div>

<div class="button-cal">
    <button class="button" onclick="currentdisplay=currentdisplay+'4'; document.querySelector('#calculatour').value=currentdisplay">4</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'5'; document.querySelector('#calculatour').value=currentdisplay">5</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'6'; document.querySelector('#calculatour').value=currentdisplay">6</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'-'; document.querySelector('#calculatour').value=currentdisplay">-</button>
</div>

<div class="button-cal">
    <button class="button" onclick="currentdisplay=currentdisplay+'1'; document.querySelector('#calculatour').value=currentdisplay">1</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'2'; document.querySelector('#calculatour').value=currentdisplay">2</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'3'; document.querySelector('#calculatour').value=currentdisplay">3</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'+'; document.querySelector('#calculatour').value=currentdisplay">+</button>
</div>

<div class="button-cal">
    <button class="button" onclick="currentdisplay=currentdisplay+'/'; document.querySelector('#calculatour').value=currentdisplay">/</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'0'; document.querySelector('#calculatour').value=currentdisplay">0</button>
    <button class="button" onclick="currentdisplay=currentdisplay+'.'; document.querySelector('#calculatour').value=currentdisplay">.</button>
    <button class="button" onclick=" let result=eval(currentdisplay); currentdisplay='= '+result; document.querySelector('#calculatour').value=currentdisplay">=</button>
</div>

</div>
    </div>
   
    <script>
        let currentdisplay='';
        document.querySelector('#calculatour').value=currentdisplay;
    </script>
</body>
</html>
